<!DOCTYPE html>
<html>
<head>
    <title>Previous Year Papers</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        html, body {
            height: 100%;
        }

        body {
            background: url("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f") no-repeat center center/cover;
        }

        .overlay {
            height: 100vh;
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);

            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0,0,0,0.4);
            text-align: center;
        }

        select, button {
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #ccc;
            width: 100%;
        }

        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .papers {
            margin-top: 20px;
            min-height: 120px;
        }

        .papers a {
            display: block;
            margin: 8px;
            padding: 10px;
            background: #f1f1f1;
            border-radius: 6px;
            text-decoration: none;
            color: #333;
        }

        .papers a:hover {
            background: #007BFF;
            color: white;
        }
    </style>
</head>

<body>

<div class="overlay">

    <h1>📚 Previous Year Question Papers</h1>

    <div class="container">

        <!-- Department -->
        <select id="department" onchange="handleDeptChange()">
            <option value="">Select Department</option>

            <optgroup label="Arts Faculty">
                <option value="english">English</option>
                <option value="history">History</option>
                <option value="politicalscience">Political Science</option>
                <option value="anthropology">Anthropology</option>
            </optgroup>

            <optgroup label="Science Faculty">
                <option value="physics">Physics</option>
                <option value="mathematics">Mathematics</option>
                <option value="chemistry">Chemistry</option>
            </optgroup>

            <optgroup label="Commerce & Management">
                <option value="commerce">Commerce</option>
                <option value="mba">MBA</option>
            </optgroup>

            <optgroup label="Engineering">
                <option value="btech">BTech</option>
            </optgroup>
        </select>

        <!-- Semester -->
        <select id="semester" style="display:none;">
            <option value="">Select Semester</option>
            <option value="sem1">Sem 1</option>
            <option value="sem2">Sem 2</option>
            <option value="sem3">Sem 3</option>
            <option value="sem4">Sem 4</option>
            <option value="sem5">Sem 5</option>
            <option value="sem6">Sem 6</option>
            <option value="sem7">Sem 7</option>
            <option value="sem8">Sem 8</option>
        </select>

        <!-- Year -->
        <select id="year">
            <option value="">Select Year</option>
            <option value="2026">2026</option>
            <option value="2025">2025</option>
            <option value="2024">2024</option>
            <option value="2023">2023</option>
        </select>

        <!-- Search Button -->
        <button onclick="filterPapers()">Search</button>

        <!-- Results -->
        <div class="papers" id="results"></div>

    </div>

</div>

<script>

// Show / hide semester
function handleDeptChange() {
    const dept = document.getElementById("department").value;
    const sem = document.getElementById("semester");

    if (dept === "btech") {
        sem.style.display = "block";
    } else {
        sem.style.display = "none";
        sem.value = "";
    }
}

// Main logic
function filterPapers() {
    const dept = document.getElementById("department").value;
    const year = document.getElementById("year").value;
    const sem = document.getElementById("semester").value;

    const results = document.getElementById("results");
    results.innerHTML = "";

    if (!dept || !year) {
        results.innerHTML = "<p>Select department and year</p>";
        return;
    }

    let fileName = "";

    if (dept === "btech") {
        if (!sem) {
            results.innerHTML = "<p>Select semester</p>";
            return;
        }
        fileName = `${dept}_${sem}_${year}.pdf`;
    } else {
        fileName = `${dept}_${year}.pdf`;
    }

    const base = "https://your-username.github.io/your-repo/papers/";
    const fullPath = base + fileName;

    // Check if file exists
    fetch(fullPath)
        .then(res => {
            if (res.ok) {
                const link = document.createElement("a");
                link.href = fullPath;
                link.textContent = "📄 Open Paper";
                link.target = "_blank";
                results.appendChild(link);
            } else {
                results.innerHTML = "<p style='color:red; font-weight:bold;'>No files found</p>";
            }
        })
        .catch(() => {
            results.innerHTML = "<p style='color:red; font-weight:bold;'>No files found</p>";
        });
}

</script>

</body>
</html>
