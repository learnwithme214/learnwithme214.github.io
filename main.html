<!DOCTYPE html>
<html>
<head>
    <title>Previous Year Papers</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            
            /* Background Image */
            background: url("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f") no-repeat center center/cover;
            
            color: #333;
        }

        /* Overlay for readability */
        .overlay {
            background: rgba(0, 0, 0, 0.6);
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            text-align: center;
        }

        select, button {
            padding: 10px;
            margin: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .papers {
            margin-top: 20px;
        }

        .papers a {
            display: block;
            margin: 8px;
            padding: 10px;
            background: #f1f1f1;
            border-radius: 5px;
            text-decoration: none;
            color: #333;
            transition: 0.3s;
        }

        .papers a:hover {
            background: #007BFF;
            color: white;
        }

        .banner {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<div class="overlay">

    <h1>📚 Previous Year Question Papers</h1>

    <div class="container">

        <!-- Banner -->
        <img class="banner" src="https://via.placeholder.com/500x200" alt="Banner">

        <!-- Filters -->
        <div>
            <select id="department">
                <option value="">Select Department</option>
                <option value="science">Science</option>
                <option value="arts">Arts</option>
            </select>

            <select id="year">
                <option value="">Select Year</option>
                <option value="2023">2023</option>
                <option value="2022">2022</option>
            </select>

            <br>

            <button onclick="filterPapers()">Search</button>
        </div>

        <!-- Results -->
        <div class="papers" id="results"></div>

    </div>

</div>
