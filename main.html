<!DOCTYPE html>
<html>
<head>
    <title>Previous Year Papers</title>

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        html, body {
            height: 100%;
        }

        /* Background */
        body {
            background: url("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f") no-repeat center center/cover;
        }

        /* Fullscreen overlay */
        .overlay {
            height: 100vh;
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);

            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        /* Title */
        h1 {
            color: white;
            margin-bottom: 20px;
        }

        /* Card */
        .container {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0,0,0,0.4);
            text-align: center;

            animation: fadeIn 0.6s ease;
        }

        /* Inputs */
        select, button {
            padding: 10px;
            margin: 10px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #ccc;
            width: 80%;
        }

        button {
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        /* Results */
        .papers {
            margin-top: 20px;
            min-height: 120px;
        }

        .papers a {
            display: block;
            margin: 8px;
            padding: 10px;
            background: #f1f1f1;
            border-radius: 6px;
            text-decoration: none;
            color: #333;
            transition: 0.3s;
        }

        .papers a:hover {
            background: #007BFF;
            color: white;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<div class="overlay">

    <h1>📚 Previous Year Question Papers</h1>

    <div class="container">

        <!-- Filters -->
        <select id="department">
            <option value="">Select Department</option>
            <option value="Anthropology">Anthropology</option>
            <option value="Mathematics">Mathematics</option>
        </select>

        <select id="year">
            <option value="">Select Year</option>
            <option value="2025">2025</option>
            <option value="2024">2024</option>
            <option value="2023">2023</option>
            <option value="2022">2022</option>
        </select>

        <button onclick="filterPapers()">Search</button>

        <!-- Results -->
        <div class="papers" id="results"></div>

    </div>

</div>

<script>
const papers = [
    { dept: "Anthropology", year: "2025", name: "Anthropology 2025 Paper", link: "#" },
    { dept: "Anthropology", year: "2024", name: "Anthropology 2024 Paper", link: "#" },
    { dept: "Mathematics", year: "2023", name: "Mathematics 2023 Paper", link: "#" },
    { dept: "Mathematics", year: "2022", name: "Mathematics 2022 Paper", link: "#" }
];

function filterPapers() {
    const dept = document.getElementById("department").value;
    const year = document.getElementById("year").value;
    const results = document.getElementById("results");

    results.innerHTML = "";

    const filtered = papers.filter(p =>
        (dept === "" || p.dept === dept) &&
        (year === "" || p.year === year)
    );

    if (filtered.length === 0) {
        results.innerHTML = "<p style='color:red; font-weight:bold;'>No papers found</p>";
        return;
    }

    filtered.forEach(p => {
        const link = document.createElement("a");
        link.href = p.link;
        link.textContent = p.name;
        link.target = "_blank";
        results.appendChild(link);
    });
}

/* Show all papers on first load */
window.onload = filterPapers;
</script>

</body>
</html>
