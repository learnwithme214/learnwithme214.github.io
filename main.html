<!DOCTYPE html>
<html>
<head>
    <title>Previous Year Papers</title>

    <style>
        /* Full screen fix */
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Background image */
        body {
            background: url("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f") no-repeat center center/cover;
        }

        /* Overlay */
        .overlay {
            min-height: 100vh;
            width: 100%;
            background: rgba(0, 0, 0, 0.25);

            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: white;
            margin-top: 20px;
        }

        /* Card container */
        .container {
            margin-top: 30px;
            width: 90%;
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            text-align: center;
        }

        select, button {
            padding: 10px;
            margin: 10px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .papers {
            margin-top: 20px;
        }

        .papers a {
            display: block;
            margin: 8px;
            padding: 10px;
            background: #f1f1f1;
            border-radius: 6px;
            text-decoration: none;
            color: #333;
            transition: 0.3s;
        }

        .papers a:hover {
            background: #007BFF;
            color: white;
        }
    </style>
</head>

<body>

<div class="overlay">

    <h1>📚 Previous Year Question Papers</h1>

    <div class="container">

        <!-- Filters -->
        <select id="department">
            <option value="">Select Department</option>
            <option value="Anthropology">Anthropology</option>
            <option value="Mathematics">Mathematics</option>
        </select>

        <select id="year">
            <option value="">Select Year</option>
            <option value="2025">2025</option>
            <option value="2024">2024</option>
            <option value="2023">2023</option>
            <option value="2022">2022</option>
        </select>

        <br>

        <button onclick="filterPapers()">Search</button>

        <!-- Results -->
        <div class="papers" id="results"></div>

    </div>

</div>

<script>
const papers = [
    { dept: "Anthropology", year: "2025", name: "Anthropology 2025 Paper", link: "#" },
    { dept: "Anthropology", year: "2024", name: "Anthropology 2024 Paper", link: "#" },
    { dept: "Mathematics", year: "2023", name: "Mathematics 2023 Paper", link: "#" },
    { dept: "Mathematics", year: "2022", name: "Mathematics 2022 Paper", link: "#" }
];

function filterPapers() {
    const dept = document.getElementById("department").value;
    const year = document.getElementById("year").value;
    const results = document.getElementById("results");

    results.innerHTML = "";

    const filtered = papers.filter(p =>
        (dept === "" || p.dept === dept) &&
        (year === "" || p.year === year)
    );

    if (filtered.length === 0) {
        results.innerHTML = "<p>No papers found</p>";
        return;
    }

    filtered.forEach(p => {
        const link = document.createElement("a");
        link.href = p.link;
        link.textContent = p.name;
        link.target = "_blank";
        results.appendChild(link);
    });
}
</script>

</body>
</html>
