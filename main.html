<!DOCTYPE html>
<html>
<head>
    <title>Previous Year Papers</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        html, body {
            height: 100%;
        }

        body {
            background: url("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f") no-repeat center center/cover;
        }

        .overlay {
            height: 100vh;
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);

            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0,0,0,0.4);
            text-align: center;
        }

        select, button {
    padding: 10px;
    margin: 10px 0;   /* vertical spacing only */
    font-size: 16px;
    border-radius: 6px;
    border: 1px solid #ccc;
    width: 100%;
}
        button {
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .papers {
            margin-top: 20px;
            min-height: 120px;
        }

        .papers a {
            display: block;
            margin: 8px;
            padding: 10px;
            background: #f1f1f1;
            border-radius: 6px;
            text-decoration: none;
            color: #333;
        }

        .papers a:hover {
            background: #007BFF;
            color: white;
        }
    </style>
</head>

<body>

<div class="overlay">

    <h1>📚 Previous Year Question Papers</h1>

    <div class="container">

        <!-- Department -->
        <select id="department" onchange="handleDeptChange()">
            <option value="">Select Department</option>

            <optgroup label="Arts Faculty">
                <option value="English">English</option>
                <option value="History">History</option>
                <option value="Political Science">Political Science</option>
                <option value="Anthropology">Anthropology</option>
            </optgroup>

            <optgroup label="Science Faculty">
                <option value="Physics">Physics</option>
                <option value="Mathematics">Mathematics</option>
                <option value="Chemistry">Chemistry</option>
            </optgroup>

            <optgroup label="Commerce & Management">
                <option value="Commerce">Commerce</option>
                <option value="MBA">MBA</option>
            </optgroup>

            <!-- IMPORTANT -->
            <optgroup label="Engineering">
                <option value="BTech">Bachelor of Technology (B.Tech)</option>
            </optgroup>
        </select>

        <!-- Semester (hidden by default) -->
        <select id="semester" style="display:none;">
            <option value="">Select Semester</option>
            <option value="Sem 1">Sem 1</option>
            <option value="Sem 2">Sem 2</option>
            <option value="Sem 3">Sem 3</option>
            <option value="Sem 4">Sem 4</option>
            <option value="Sem 5">Sem 5</option>
            <option value="Sem 6">Sem 6</option>
            <option value="Sem 7">Sem 7</option>
            <option value="Sem 8">Sem 8</option>
        </select>


        <button onclick="filterPapers()">Search</button>

        <!-- Results -->
        <div class="papers" id="results"></div>

    </div>

</div>

<script>
const papers = [
    { dept: "BTech", sem: "Sem 1", year: "2025", name: "BTech Sem1 2025 Paper", link: "#" },
    { dept: "BTech", sem: "Sem 2", year: "2024", name: "BTech Sem2 2024 Paper", link: "#" },
    { dept: "Mathematics", year: "2023", name: "Mathematics 2023 Paper", link: "#" },
    { dept: "English", year: "2022", name: "English 2022 Paper", link: "#" }
];

// Show / hide semester dropdown
function handleDeptChange() {
    const dept = document.getElementById("department").value;
    const sem = document.getElementById("semester");

    if (dept === "BTech") {
        sem.style.display = "block";
    } else {
        sem.style.display = "none";
        sem.value = "";
    }
}

function filterPapers() {
    const dept = document.getElementById("department").value;
    const year = document.getElementById("year").value;
    const sem = document.getElementById("semester").value;
    const results = document.getElementById("results");

    results.innerHTML = "";

    const filtered = papers.filter(p =>
        (dept === "" || p.dept === dept) &&
        (year === "" || p.year === year) &&
        (dept !== "BTech" || sem === "" || p.sem === sem)
    );

    if (filtered.length === 0) {
        results.innerHTML = "<p style='color:red; font-weight:bold;'>No papers found</p>";
        return;
    }

    filtered.forEach(p => {
        const link = document.createElement("a");
        link.href = p.link;
        link.textContent = p.name;
        link.target = "_blank";
        results.appendChild(link);
    });
}

/* Load on start */
window.onload = filterPapers;
</script>

</body>
</html>
