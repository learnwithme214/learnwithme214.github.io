<!DOCTYPE html>
<html>
<head>
    <title>Show Image</title>
</head>
<body>

<button onclick="showImage()">Show</button>

<br><br>

<img id="gameImage" src="game.png" style="display:none; width:400px;">

<script>
function showImage() {
    document.getElementById("gameImage").style.display = "block";
}
</script>

</body>
</html>
