<!DOCTYPE html>
<html>
<head>
    <title>Previous Year Papers</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: url("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f") no-repeat center center/cover;
            min-height: 100vh;
        }

        /* dark overlay */
        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.35);
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* container */
        .container {
            width: 95%;
            max-width: 650px;
            min-height: 250px;
            margin: auto;
            margin-top: 100px;
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            min-height: 70vh;
        }

        /* inputs */
        select, button {
            width: 100%;
            padding: 14px;
            font-size: 17px;
            border-radius: 8px;
            margin-bottom: 18px;
        }

        button {
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        /* results */
        .papers a {
            display: block;
            margin-top: 10px;
            padding: 10px;
            background: #eee;
            text-decoration: none;
            color: black;
            border-radius: 5px;
        }

        .download {
            font-size: 12px;
            color: blue;
        }

        /* ===== HAMBURGER MENU ===== */

        .menu-icon {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 30px;
            height: 22px;
            cursor: pointer;
            z-index: 1001;

            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .menu-icon span {
            height: 4px;
            width: 100%;
            background: white;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        /* animation to X */
        .menu-icon.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .menu-icon.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-icon.active span:nth-child(3) {
            transform: rotate(-45deg) translate(6px, -6px);
        }

        /* side menu */
        .side-menu {
            position: fixed;
            top: 0;
            left: -260px;
            width: 260px;
            height: 30%;
            background: rgba(0,0,0,0.9);
            padding-top: 60px;
            transition: left 0.35s ease;
            z-index: 1000;
        }

        .side-menu.open {
            left: 0;
        }

        .side-menu a {
            display: block;
            color: white;
            padding: 15px;
            text-decoration: none;
            font-size: 18px;
        }

        .side-menu a:hover {
            background: #00ffcc;
            color: black;
        }
    </style>
</head>

<body>

<!-- Hamburger -->
<div class="menu-icon" id="menuIcon" onclick="toggleMenu()">
    <span></span>
    <span></span>
    <span></span>
</div>

<!-- Side Menu -->
<div class="side-menu" id="sideMenu">
    <a href="#">Home</a>
    <a href="#">Papers</a>
    <a href="#">About</a>
</div>

<!-- Main UI -->
<div class="container">

    <h2>📚 Previous Year Papers</h2>

    <select id="department" onchange="handleDept()">
        <option value="">Select Department</option>
        <option value="english">English</option>
        <option value="history">History</option>
        <option value="physics">Physics</option>
        <option value="btech">BTech</option>
    </select>

    <select id="semester" style="display:none;">
        <option value="">Select Semester</option>
        <option value="sem1">Sem 1</option>
        <option value="sem2">Sem 2</option>
        <option value="sem3">Sem 3</option>
        <option value="sem4">Sem 4</option>
        <option value="sem5">Sem 5</option>
        <option value="sem6">Sem 6</option>
    </select>

    <select id="year">
        <option value="">Select Year</option>
        <option value="2026">2026</option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
        <option value="2023">2023</option>
        <option value="2022">2022</option>
        <option value="2021">2021</option>
    </select>

    <button onclick="searchPapers()">Search</button>

    <div class="papers" id="results"></div>

</div>

<script>

/* menu toggle */
function toggleMenu() {
    const menu = document.getElementById("sideMenu");
    const icon = document.getElementById("menuIcon");

    menu.classList.toggle("open");
    icon.classList.toggle("active");
}

/* semester toggle */
function handleDept() {
    const dept = document.getElementById("department").value;
    const sem = document.getElementById("semester");

    if (dept === "btech") {
        sem.style.display = "block";
    } else {
        sem.style.display = "none";
        sem.value = "";
    }
}

/* search */
function searchPapers() {

    const dept = document.getElementById("department").value.toLowerCase();
    const sem = document.getElementById("semester").value.toLowerCase();
    const year = document.getElementById("year").value;
    const results = document.getElementById("results");

    results.innerHTML = "";

    if (!dept || !year) {
        results.innerHTML = "<p>Select department and year</p>";
        return;
    }

    if (dept === "btech" && !sem) {
        results.innerHTML = "<p>Select semester</p>";
        return;
    }

    fetch("papers/index.json")
        .then(res => res.json())
        .then(data => {

            let filtered = data.filter(item => {
                if (dept === "btech") {
                    return item.dept === dept &&
                           item.sem === sem &&
                           item.year === year;
                } else {
                    return item.dept === dept &&
                           item.year === year;
                }
            });

            if (filtered.length === 0) {
                results.innerHTML = "<p style='color:red;'>No files found</p>";
                return;
            }

            filtered.forEach(file => {

                let link = document.createElement("a");
                link.href = "papers/" + file.file;
                link.target = "_blank";
                link.textContent = "📄 " + file.file;

                let download = document.createElement("a");
                download.href = "papers/" + file.file;
                download.download = file.file;
                download.textContent = "⬇ Download";
                download.className = "download";

                results.appendChild(link);
                results.appendChild(download);
            });

        })
        .catch(() => {
            results.innerHTML = "<p style='color:red;'>Error loading index.json</p>";
        });
}

</script>

</body>
</html>
